<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Habits" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon-120.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="theme-color" content="#0f0f0f" />
  <!-- iOS Splash Screens (generated by generate-splash.py) -->
  <link rel="apple-touch-startup-image" media="screen and (device-width:375px) and (device-height:667px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)" href="splash-750x1334.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width:414px) and (device-height:736px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" href="splash-1242x2208.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width:375px) and (device-height:812px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" href="splash-1125x2436.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width:414px) and (device-height:896px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)" href="splash-828x1792.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width:414px) and (device-height:896px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" href="splash-1242x2688.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width:360px) and (device-height:780px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" href="splash-1080x2340.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width:390px) and (device-height:844px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" href="splash-1170x2532.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width:428px) and (device-height:926px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" href="splash-1284x2778.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width:393px) and (device-height:852px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" href="splash-1179x2556.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width:430px) and (device-height:932px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" href="splash-1290x2796.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width:402px) and (device-height:874px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" href="splash-1206x2622.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width:440px) and (device-height:956px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" href="splash-1320x2868.png">
</head>
<body>

  <!-- Loading screen shown until Firebase auth resolves -->
  <div id="app-loading-screen">
    <div class="app-loading-fire">🔥</div>
    <div class="app-loading-text">Loading Habits…</div>
  </div>

  <div class="app">

    <div id="auth-gate" class="auth-gate">
      <div class="auth-gate-bg"></div>
      <div class="auth-gate-inner">
        <div class="auth-gate-logo">🔥</div>
        <h1 class="auth-gate-title">Daily Habit Tracker</h1>
        <p class="auth-gate-sub">Build better habits. Every day.</p>
        <div id="auth-gate-landing" class="auth-gate-landing">
          <button class="auth-gate-login-btn" onclick="showAuthGateForm('signin')">Log In with Email</button>
          <button class="auth-gate-create-link" onclick="showAuthGateForm('create')">Create Account</button>
        </div>
        <div id="auth-gate-form" class="auth-gate-form-hidden">
          <div class="auth-gate-loading"><div class="pull-spinner"></div></div>
        </div>
      </div>
    </div>

    <div class="pages" id="pages">

      <!-- PAGE 1: PROGRESS -->
      <div class="page" id="page-progress">
        <div class="progress-bg" id="progress-bg"></div>
        <div class="pull-refresh" id="pull-refresh">
          <div class="pull-spinner"></div>
        </div>
        <div class="page-inner">
          <h1>Progress</h1>
          <p class="date" id="progress-date"></p>

          <div class="streak-grid" id="streak-grid"></div>

          <div class="cal-card">
            <div class="month-header">
              <button class="month-nav" id="prev-month">‹</button>
              <span class="month-label" id="month-label"></span>
              <button class="month-nav" id="next-month">›</button>
            </div>
            <div class="legend" id="legend"></div>
            <div class="calendar" id="calendar"></div>
          </div>

          <!-- History -->
          <div class="history-section">
            <h2 class="history-title">History</h2>
            <div class="history-list" id="history-list"></div>
          </div>

        </div>
      </div>

      <!-- PAGE 2: HABITS -->
      <div class="page" id="page-habits">
        <div class="page-inner">
          <div class="habits-header-row">
            <div>
              <h1>Daily Habits</h1>
              <p class="date" id="today-date"></p>
            </div>
            <button class="habit-edit-btn" id="habit-edit-btn" onclick="toggleHabitEditMode()">+</button>
          </div>
          <div class="habits" id="habit-list"></div>
        </div>
      </div>

      <!-- PAGE 3: JOURNAL -->
      <div class="page" id="page-journal">
        <div class="page-inner">

          <!-- Quote of the Day -->
          <div class="quote-card" id="quote-card">
            <div class="quote-mark">"</div>
            <div class="quote-text" id="quote-text"></div>
            <div class="quote-author" id="quote-author"></div>
          </div>

          <h2 class="grateful-title">Gratitude</h2>
          <p class="date" id="journal-date"></p>

          <div class="grateful-list">

            <div class="grateful-item" id="gitem-1">
              <div class="grateful-num">1</div>
              <div class="grateful-content">
                <textarea id="grateful-1" class="grateful-input" placeholder="I'm grateful for..."></textarea>
                <div class="grateful-done-text" id="gdone-1"></div>
              </div>
              <button class="grateful-check" id="gcheck-1" onclick="submitGrateful(1)" title="Submit">
                <span class="check-icon">✓</span>
                <span class="edit-icon">✏️</span>
              </button>
            </div>

            <div class="grateful-item" id="gitem-2">
              <div class="grateful-num">2</div>
              <div class="grateful-content">
                <textarea id="grateful-2" class="grateful-input" placeholder="I'm grateful for..."></textarea>
                <div class="grateful-done-text" id="gdone-2"></div>
              </div>
              <button class="grateful-check" id="gcheck-2" onclick="submitGrateful(2)" title="Submit">
                <span class="check-icon">✓</span>
                <span class="edit-icon">✏️</span>
              </button>
            </div>

            <div class="grateful-item" id="gitem-3">
              <div class="grateful-num">3</div>
              <div class="grateful-content">
                <textarea id="grateful-3" class="grateful-input" placeholder="I'm grateful for..."></textarea>
                <div class="grateful-done-text" id="gdone-3"></div>
              </div>
              <button class="grateful-check" id="gcheck-3" onclick="submitGrateful(3)" title="Submit">
                <span class="check-icon">✓</span>
                <span class="edit-icon">✏️</span>
              </button>
            </div>

          </div>

        </div>
      </div>

      <!-- PAGE 4: FRIENDS -->
      <div class="page" id="page-friends">
        <div class="page-inner friends-page">
          <div class="friends-title-row">
            <h1>Friends</h1>
            <button class="friends-manage-btn" onclick="openFriendsManager()" title="Add or remove friends">+</button>
          </div>
          <div id="friends-content">
            <div class="auth-gate-loading"><div class="pull-spinner"></div></div>
          </div>
        </div>
      </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn" id="nav-0" onclick="goTo(0)">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Progress</span>
      </button>
      <button class="nav-btn active" id="nav-1" onclick="goTo(1)">
        <span class="nav-icon">✅</span>
        <span class="nav-label">Habits</span>
      </button>
      <button class="nav-btn" id="nav-2" onclick="goTo(2)">
        <span class="nav-icon">📓</span>
        <span class="nav-label">Gratitude</span>
      </button>
      <button class="nav-btn" id="nav-3" onclick="goTo(3)">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Friends</span>
      </button>
    </nav>

    <!-- Hamburger Button -->
    <button class="hamburger-btn" id="hamburger-btn" onclick="toggleDrawer()">
      <div class="ham-line"></div>
      <div class="ham-line"></div>
      <div class="ham-line"></div>
    </button>

    <!-- Profile Avatar Button (top-right, visible when logged in) -->
    <button id="profile-avatar-btn" onclick="openDrawerToAccount()" title="Profile"></button>

    <!-- Hidden file input for photo upload -->
    <input type="file" id="profile-photo-input" accept="image/*" style="display:none" onchange="handleProfilePhotoSelect(this)" />

    <!-- Drawer Overlay -->
    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

    <!-- Side Drawer -->
    <div class="side-drawer" id="side-drawer">
      <div class="drawer-header">
        <span class="drawer-title" id="drawer-title">Menu</span>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
      </div>
      <div class="drawer-body" id="drawer-body"></div>
    </div>

  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
